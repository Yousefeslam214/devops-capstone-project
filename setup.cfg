[nosetests]
verbosity=2
with-spec=1
spec-color=1
with-coverage=1
cover-package=service
cover-erase=1
cover-min-percentage=95

[coverage:run]
branch=True
source=service

[coverage:report]
show_missing=True
fail_under=95

[flake8]
max-line-length=120
max-complexity=10
exclude=.git,.venv,venv,__pycache__,.pytest_cache

[pylint.MASTER]
ignore=venv

[pylint.'MESSAGES CONTROL']
disable=C0103,C0114,C0115,C0116,R0801,R0903
